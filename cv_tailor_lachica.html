<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CV Tailor — La Chica Salsabila Bilqis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #111;
      color: #d8d8d8;
    }

    /* ── App shell ──────────────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Left panel ─────────────────────────────────────────────────────── */
    #left-panel {
      width: 280px;
      min-width: 280px;
      background: #1c1c1e;
      border-right: 1px solid #2e2e32;
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 20px;
    }

    .panel-title    { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .panel-subtitle { font-size: 11px; color: #555; margin-top: 3px; }

    .field-label {
      display: block;
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #666;
      margin-bottom: 7px;
    }

    select {
      width: 100%;
      background: #2a2a2d;
      border: 1px solid #3a3a3e;
      border-radius: 7px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 9px 11px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #555; }

    .divider { border: none; border-top: 1px solid #28282c; }

    #download-btn, #download-cv-only-btn, #download-cl-only-btn {
      width: 100%;
      background: #1a2f1a;
      border: 1px solid #2a4a2a;
      border-radius: 7px;
      color: #6c6;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #download-btn:hover, #download-cv-only-btn:hover { background: #1e3b1e; }
    #download-cv-only-btn { background: #1a2a2a; border-color: #2a3e3e; color: #6bb; margin-top: 6px; }
    #download-cv-only-btn:hover { background: #1e3535; }
    #download-cl-only-btn { background: #251a2a; border-color: #3e2a4a; color: #b8a; margin-top: 6px; }
    #download-cl-only-btn:hover { background: #301e38; }

    .hint {
      font-size: 11px;
      color: #444;
      line-height: 1.5;
    }

    /* ── Right panel ────────────────────────────────────────────────────── */
    #right-panel {
      flex: 1;
      background: #1a1a1a;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 80px;
    }

    /* ── CV page card ───────────────────────────────────────────────────── */
    .cv-page-card {
      width: 794px;
      background: #fff;
      padding: 33px 77px;
      box-shadow: 0 6px 48px rgba(0,0,0,0.55);
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      color: #000;
      margin-bottom: 28px;
    }

    /* ── Keep entry header with first bullet ───────────────────────────── */
    .keep-entry { break-inside: avoid; page-break-inside: avoid; }

    /* ── CV element styles — La Chica layout ────────────────────────────── */
    /* Name: centered, bold, full width, no box */
    .cv-page-card .name-row { text-align: center; margin-bottom: 2px; }
    .cv-page-card .name-box {
      display: inline;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    /* Horizontal rule spanning full width */
    .cv-page-card .name-rule {
      height: 1px; background: #000;
      width: 100%;
      margin-top: 4px; margin-bottom: 4px;
    }
    /* Contact: centered */
    .cv-page-card .contact { text-align: center; font-size: 11px; margin: 2px 0 0 0; }
    /* Section header: bold, centered */
    .cv-page-card .section {
      font-weight: bold; font-size: 12px;
      text-align: center;
      margin: 10px 0 2px 0;
    }
    /* Entry row: role (left) + location (right), no border, bold */
    .cv-page-card .entry {
      display: flex; font-weight: bold; font-size: 12px;
      padding: 2px 0 0 0; margin-top: 4px;
      border-bottom: none;
    }
    .cv-page-card .entry-l { flex: 1; text-align: left;  min-width: 0; }
    .cv-page-card .entry-c { display: none; }
    .cv-page-card .entry-r { text-align: right; white-space: nowrap; padding-left: 8px; }
    /* Plain description text — non-italic */
    .cv-page-card .plain {
      font-size: 12px; margin: 0 0 1px 0;
      font-style: normal;
    }
    /* Sub-line: company (left italic) + date (right italic) */
    .cv-page-card .plain-row {
      display: flex; font-size: 12px; font-style: italic; margin: 0 0 1px 0;
    }
    .cv-page-card .plain-row .plain-l { flex: 1; min-width: 0; }
    .cv-page-card .plain-row .plain-r { text-align: right; white-space: nowrap; padding-left: 8px; }
    /* Bullets */
    .cv-page-card .bullet {
      padding-left: 16px; text-indent: -10px;
      font-size: 12px; line-height: 1.4; margin: 0;
      font-style: normal;
    }
    /* Bullet with right-aligned date (Conference) */
    .cv-page-card .bullet-row {
      display: flex; font-size: 12px; line-height: 1.4; margin: 0;
    }
    .cv-page-card .bullet-row .bullet-main {
      flex: 1; padding-left: 16px; text-indent: -10px; min-width: 0;
    }
    .cv-page-card .bullet-row .bullet-date {
      font-style: italic; white-space: nowrap; padding-left: 8px; flex-shrink: 0; align-self: flex-start;
    }
    .cv-page-card .sub-bullet {
      padding-left: 28px; text-indent: -10px;
      font-size: 12px; line-height: 1.4; margin: 0;
    }
    /* Sub-section header (Organization, Volunteer & Project, etc.) */
    .cv-page-card .sub-section {
      font-weight: bold; font-size: 12px;
      text-align: left;
      margin: 8px 0 0 0;
    }

    /* ── Cover letter card ──────────────────────────────────────────────── */
    #cover-letter-section {
      width: 794px;
      background: #fff;
      padding: 33px 77px;
      box-shadow: 0 6px 48px rgba(0,0,0,0.55);
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.65;
      color: #000;
      margin-top: 28px;
      display: none;
    }
    #cover-letter-section.visible { display: block; }
    #cover-letter-section .cl-heading {
      font-weight: bold; font-size: 12px;
      border-bottom: 0.75px solid #000;
      padding-bottom: 3px; margin-bottom: 14px;
    }
    #cover-letter-section p { margin-bottom: 10px; }

    /* ── Print ──────────────────────────────────────────────────────────── */
    @media print {
      html, body { background: #fff; height: auto; }
      #app        { display: block; height: auto; overflow: visible; }
      #left-panel { display: none !important; }
      #right-panel {
        display: block; padding: 0; overflow: visible;
        height: auto; align-items: unset;
      }
      #cv-pages-container { display: block; }
      #tracker-section    { display: none !important; }
      .cv-page-card {
        width: 100%; padding: 33px 77px; margin: 0;
        box-shadow: none; font-size: 9pt; line-height: 1.4;
        page-break-after: always; break-after: page;
      }
      .cv-page-card:last-of-type {
        page-break-after: avoid; break-after: avoid;
      }
      .cv-page-card .name-box   { font-size: 11pt; }
      .cv-page-card .name-rule  { height: 0.75pt; margin-top: 3pt; margin-bottom: 3pt; }
      .cv-page-card .contact    { font-size: 8.5pt; }
      .cv-page-card .section    { font-size: 9pt; margin-top: 8pt; }
      .cv-page-card .entry      { font-size: 9pt; }
      .cv-page-card .plain      { font-size: 9pt; }
      .cv-page-card .bullet     { font-size: 9pt; padding-left: 12pt; text-indent: -8pt; }
      .cv-page-card .sub-bullet { font-size: 9pt; padding-left: 20pt; text-indent: -8pt; }
      #cover-letter-section {
        display: block !important; margin-top: 0; padding: 33px 77px;
        box-shadow: none; width: 100%; font-size: 9pt;
        page-break-before: always; break-before: page;
      }
      /* Cover letter only mode */
      body.print-cl-only #cv-pages-container { display: none !important; }
      body.print-cl-only #cover-letter-section {
        page-break-before: avoid !important; break-before: avoid !important;
      }
      @page { size: A4; margin: 0; }
    }

    /* ── Tracker ─────────────────────────────────────────────────────────── */
    #tracker-section {
      padding: 32px 40px 80px;
      overflow-y: auto;
      height: 100%;
    }
    .tracker-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 20px; }
    .tracker-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .tracker-table th {
      background: #2a2a2d; color: #888; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.6px; padding: 8px 10px; text-align: left;
      border-bottom: 1px solid #333;
    }
    .tracker-table td {

    }
    .tracker-table tr:hover td { background: #1e1e21; }
    .tracker-table select, .tracker-table input[type="date"] {

      color: #e0e0e0; font-size: 12px; padding: 4px 7px; width: 100%;
    }
    .tracker-table .notes-cell {

    .tracker-table a:hover { text-decoration: underline; }
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    #tracker-btn {
      background: #2a2a2d; color: #aaa; border: 1px solid #3a3a3e; border-radius: 7px;
      padding: 9px 14px; font-size: 12.5px; cursor: pointer; width: 100%;
      font-family: inherit; text-align: left;
    }
    #tracker-btn:hover { background: #333; color: #fff; }
    #cv-btn {
      background: #2a2a2d; color: #aaa; border: 1px solid #3a3a3e; border-radius: 7px;
      padding: 9px 14px; font-size: 12.5px; cursor: pointer; width: 100%;
      font-family: inherit; text-align: left;
    }
    #cv-btn:hover { background: #333; color: #fff; }

    /* ── JD panel ────────────────────────────────────────────────────────── */
    #jd-url-input {
      width: 100%; background: #2a2a2d; border: 1px solid #3a3a3e; border-radius: 7px;
      color: #e0e0e0; font-family: inherit; font-size: 12px; padding: 8px 10px; outline: none;
    }
    #jd-url-input:focus { border-color: #555; }
    .jd-action-btn {
      flex: 1; background: #2a2a2d; border: 1px solid #3a3a3e; border-radius: 6px;
      color: #aaa; font-family: inherit; font-size: 12px; padding: 7px 8px; cursor: pointer;
    }
    .jd-action-btn:hover { background: #333; color: #fff; }
    #jd-section {
      display: none; width: 100%; height: 100%; overflow-y: auto; padding: 32px 40px 80px;
    }
    .jd-inner { max-width: 794px; margin: 0 auto; }
    .jd-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .jd-toolbar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .jd-toolbar-url {
      flex: 1; font-size: 11px; color: #5b9cf6; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .jd-toolbar-url a { color: inherit; text-decoration: none; }
    .jd-toolbar-url a:hover { text-decoration: underline; }
    .jd-toolbar-btn {
      flex: none; background: #2a2a2d; border: 1px solid #3a3a3e; border-radius: 6px;
      color: #aaa; font-family: inherit; font-size: 12px; padding: 5px 12px; cursor: pointer;
    }
    .jd-toolbar-btn:hover { background: #333; color: #fff; }
    #jd-paste-area {
      display: none; width: 100%; background: #1c1c1e; border: 1px solid #2e2e32;
      border-radius: 8px; color: #ccc; font-family: inherit; font-size: 12px;
      padding: 14px; resize: vertical; min-height: 180px; outline: none; margin-bottom: 10px;
    }
    #jd-paste-area:focus { border-color: #444; }
    #jd-text-panel {
      background: #1c1c1e; border: 1px solid #2e2e32; border-radius: 8px;
      padding: 20px 24px; font-size: 12.5px; line-height: 1.65; color: #ccc;
      white-space: pre-wrap; word-break: break-word;
    }
  </style>

<script>
// ════════════════════════════════════════════════════════════════════════════
// CV data is loaded from cv_data.js — edit that file to add/update versions
// ════════════════════════════════════════════════════════════════════════════

// Build quick lookup maps from CV_APPLICATIONS
const CVS = Object.fromEntries(CV_APPLICATIONS.map(a => [a.key, a.cv]));
const COVERS = Object.fromEntries(CV_APPLICATIONS.map(a => [a.key, a.coverLetter || '']));

// Populate dropdown from CV_APPLICATIONS
(function populateSelect() {
  const sel = document.getElementById('version-select');
  CV_APPLICATIONS.forEach(app => {
    const opt = document.createElement('option');
    opt.value = app.key;
    opt.textContent = (app.key === 'default' ? '📄 ' : '🎯 ') + app.label;
    sel.appendChild(opt);

})();


// ════════════════════════════════════════════════════════════════════════════
// CV renderer
// ════════════════════════════════════════════════════════════════════════════

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cvBodyToHTML(text) {
  const html = [];
  let rawHtml = null;
  for (const rawLine of text.split('\n')) {
    const line = rawLine.replace(/\r$/, '').trimEnd();

    // Raw HTML passthrough block
    if (line.trim() === '<!-- html -->') { rawHtml = []; continue; }
    if (line.trim() === '<!-- /html -->') {
      if (rawHtml !== null) html.push(rawHtml.join('\n'));
      rawHtml = null; continue;
    }
    if (rawHtml !== null) { rawHtml.push(rawLine); continue; }

    if (/^# [^#]/.test(line)) {
      // Centered name, bold, full width
      const name = line.slice(2).trim();
      html.push('<div class="name-row"><span class="name-box">' + esc(name) + '</span></div>');

    } else if (line.startsWith('## ')) {
      // Contact line then full-width rule
      html.push('<p class="contact">' + esc(line.slice(3).trim()) + '</p>');
      html.push('<div class="name-rule"></div>');

    } else if (line.startsWith('### ')) {
      // Section header: centered, bold
      html.push('<p class="section">' + esc(line.slice(4).trim()) + '</p>');

    } else if (line.startsWith('#### ')) {
      // Sub-section header: bold, left-aligned
      html.push('<p class="sub-section">' + esc(line.slice(5).trim()) + '</p>');

    } else if (line.startsWith('**') && line.includes(' | ')) {
      // Entry row: **Role** | | Location  →  bold, role left, location right
      let role, loc;
      if (line.includes(' | | ')) {
        const idx = line.indexOf(' | | ');
        const m   = line.slice(0, idx).match(/\*\*(.+?)\*\*/);
        role = m ? m[1] : line.slice(0, idx).replace(/\*\*/g, '').trim();
        loc  = line.slice(idx + 5).trim();
      } else {
        const parts = line.split(' | ').map(p => p.trim());
        const m     = parts[0].match(/\*\*(.+?)\*\*/);
        role = m ? m[1] : parts[0];
        loc  = parts.length >= 3 ? parts[2] : (parts[1] || '');
      }
      html.push('<div class="entry"><span class="entry-l">' + esc(role) + '</span><span class="entry-r">' + esc(loc) + '</span></div>');

    } else if (!line.startsWith('**') && line.includes(' | | ')) {
      // Sub-line: Company | | Date  →  italic, company left, date right
      const idx   = line.indexOf(' | | ');
      const left  = line.slice(0, idx).trim();
      const right = line.slice(idx + 5).trim();
      html.push('<div class="plain-row"><span class="plain-l">' + esc(left) + '</span><span class="plain-r">' + esc(right) + '</span></div>');

    } else if (/^  +- /.test(line)) {
      html.push('<div class="sub-bullet">o&nbsp;&nbsp;' + esc(line.trim().slice(2).trim()) + '</div>');

    } else if (line.startsWith('- ') || line.startsWith('\u2022 ')) {
      // Bullet — check for right-aligned date via " | | "
      const content = line.slice(2).trim();
      if (content.includes(' | | ')) {
        const idx  = content.indexOf(' | | ');
        const left = content.slice(0, idx).trim();
        const date = content.slice(idx + 5).trim();
        html.push('<div class="bullet-row"><div class="bullet-main">&#8226;&nbsp;&nbsp;' + esc(left) + '</div><span class="bullet-date">' + esc(date) + '</span></div>');
      } else {
        html.push('<div class="bullet">&#8226;&nbsp;&nbsp;' + esc(content) + '</div>');
      }

    } else if (line.trim() === '') {
      // skip blank lines
    } else if (line.trim()) {
      html.push('<p class="plain">' + esc(line.trim()) + '</p>');
    }
  }
  return html.join('\n');
}

// ════════════════════════════════════════════════════════════════════════════
// Paginate CV into separate A4 page cards
// ════════════════════════════════════════════════════════════════════════════

const A4_CONTENT_H = 1123 - 33 - 33; // A4px minus top+bottom padding = 1057

function wrapEntriesIn(root) {
  root.querySelectorAll('.keep-entry').forEach(w => {
    while (w.firstChild) w.parentNode.insertBefore(w.firstChild, w);
    w.remove();
  });
  // Keep section/sub-section headers with their next element
  Array.from(root.querySelectorAll('.section, .sub-section')).forEach(hdr => {
    const next = hdr.nextElementSibling;
    if (next) {
      const wrapper = document.createElement('div');
      wrapper.className = 'keep-entry';
      hdr.parentNode.insertBefore(wrapper, hdr);
      wrapper.appendChild(hdr);
      wrapper.appendChild(next);
    }
  });

  // Keep entry header + sub-line + first bullet together
  Array.from(root.querySelectorAll('.entry')).forEach(entry => {
    const wrapper = document.createElement('div');
    wrapper.className = 'keep-entry';
    entry.parentNode.insertBefore(wrapper, entry);
    wrapper.appendChild(entry);
    // Pull in plain-row (sub-line) if it follows immediately
    let next = wrapper.nextElementSibling;
    if (next && (next.classList.contains('plain-row') || next.classList.contains('plain'))) {
      wrapper.appendChild(next);
      next = wrapper.nextElementSibling;
    }
    // Then pull in first bullet/description
    if (next && (next.classList.contains('bullet') || next.classList.contains('bullet-row') || next.classList.contains('sub-bullet') || next.classList.contains('plain'))) {
      wrapper.appendChild(next);
    }
  });
}

function buildPages(cvText) {
  const container = document.getElementById('cv-pages-container');

  // Render into a temporary off-screen page card for measurement
  const temp = document.createElement('div');
  temp.className = 'cv-page-card';
  temp.style.cssText += 'position:absolute;visibility:hidden;margin:0;';
  document.body.appendChild(temp);
  temp.innerHTML = cvBodyToHTML(cvText);
  wrapEntriesIn(temp);

  // Walk children and distribute into pages
  const pages   = [[]];
  const heights = [0];

  function elH(el) {
    return el.offsetHeight
         + parseFloat(getComputedStyle(el).marginTop    || 0)
         + parseFloat(getComputedStyle(el).marginBottom || 0);
  }

  // A header-only block: keep-entry containing only section/sub-section headers
  // (no real content — entry, bullet, plain-row — inside)
  function isHeaderOnly(el) {
    return el.classList.contains('keep-entry')
        && el.querySelector('.section, .sub-section')
        && !el.querySelector('.entry, .bullet, .bullet-row, .plain-row, .plain');
  }

  const children = Array.from(temp.children);
  children.forEach((child, idx) => {
    const h = elH(child);
    let pi = pages.length - 1;

    // Normal overflow: block doesn't fit → new page
    if (heights[pi] + h > A4_CONTENT_H && heights[pi] > 0) {
      pages.push([]); heights.push(0);
      pi = pages.length - 1;
    }

    // Lookahead: header-only block fits on current page but the next element
    // won't also fit → push header down so it opens the next page with content
    if (isHeaderOnly(child) && idx < children.length - 1 && heights[pi] > 0) {
      const nextH = elH(children[idx + 1]);
      if (heights[pi] + h + nextH > A4_CONTENT_H) {
        pages.push([]); heights.push(0);
        pi = pages.length - 1;
      }
    }

    pages[pi].push(child.cloneNode(true));
    heights[pi] += h;
  });

  document.body.removeChild(temp);

  // Build page card divs
  container.innerHTML = '';
  pages.forEach(children => {
    const card = document.createElement('div');
    card.className = 'cv-page-card';
    children.forEach(child => card.appendChild(child));
    container.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// Tracker — localStorage persistence
// ════════════════════════════════════════════════════════════════════════════

const STATUS_OPTIONS = ['To Apply','Applied','Phone Screen','Interview','Final Round','Offer','Rejected','Withdrawn','On Hold'];

const STATUS_COLORS = {
  'To Apply':    '#555',
  'Applied':     '#2a5298',
  'Phone Screen':'#1a6b4a',
  'Interview':   '#6b4a1a',
  'Final Round': '#5a1a7a',
  'Offer':       '#1a6b1a',
  'Rejected':    '#6b1a1a',
  'Withdrawn':   '#444',
  'On Hold':     '#5a5a1a',
};

function loadTrackerState(key) {
  try { return JSON.parse(localStorage.getItem('tracker_' + key)) || {}; } catch { return {}; }
}

function saveTrackerState(key, patch) {
  const s = loadTrackerState(key);
  localStorage.setItem('tracker_' + key, JSON.stringify({ ...s, ...patch }));
}

function renderTracker() {
  const inner = document.getElementById('tracker-inner');
  let html = '<div class="tracker-title">Application Tracker</div>';
  html += '<table class="tracker-table"><thead><tr>';
  html += '<th>#</th><th>Company</th><th>Role</th><th>Date Added</th><th>Status</th><th>Applied</th><th>Notes</th><th>JD</th>';
  html += '</tr></thead><tbody>';

  CV_APPLICATIONS.filter(a => a.key !== 'default').forEach((app, idx) => {
    const s = loadTrackerState(app.key);
    const status  = s.status      || 'To Apply';
    const applied = s.dateApplied || '';
    const notes   = s.notes       || '';
    const color   = STATUS_COLORS[status] || '#555';
    const jdLink  = app.jdUrl
      ? '<a href="' + app.jdUrl + '" target="_blank">Open ↗</a>'
      : '<span style="color:#555">–</span>';

    html += '<tr>';
    html += '<td style="color:#555">' + (idx + 1) + '</td>';
    html += '<td><strong style="color:#fff">' + app.company + '</strong></td>';
    html += '<td>' + app.role + '</td>';
    html += '<td style="color:#666">' + (app.dateAdded || '–') + '</td>';
    const k = JSON.stringify(app.key);
    html += '<td><select onchange="saveTrackerState(' + k + ',{status:this.value});renderTracker()">';
    STATUS_OPTIONS.forEach(opt => {
      html += '<option value="' + opt + '"' + (opt === status ? ' selected' : '') + '>' + opt + '</option>';
    });
    html += '</select></td>';
    html += '<td><input type="date" value="' + applied + '" onchange="saveTrackerState(' + k + ',{dateApplied:this.value})"></td>';
    html += '<td class="notes-cell"><div class="notes-editable" contenteditable="true" data-key="' + app.key + '" onblur="saveTrackerState(' + k + ',{notes:this.innerText.trim()})">' + notes + '</div></td>';
    html += '<td>' + jdLink + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  inner.innerHTML = html;
}

function showTracker() {
  document.getElementById('cv-pages-container').style.display = 'none';
  document.getElementById('cover-letter-section').classList.remove('visible');
  document.getElementById('tracker-section').style.display = 'block';
  document.getElementById('jd-section').style.display = 'none';
  document.getElementById('download-btn').style.display = 'none';
  document.getElementById('download-cv-only-btn').style.display = 'none';
  document.getElementById('download-cl-only-btn').style.display = 'none';
  document.getElementById('tracker-btn').style.display = 'none';
  document.getElementById('cv-btn').style.display = 'block';
  renderTracker();
}

function showCV() {
  document.getElementById('cv-pages-container').style.display = '';
  document.getElementById('tracker-section').style.display = 'none';
  document.getElementById('jd-section').style.display = 'none';
  document.getElementById('download-btn').style.display = '';
  document.getElementById('download-cv-only-btn').style.display = '';
  // Cover Letter Only button: only show if current version has a cover letter
  const key = document.getElementById('version-select').value;
  document.getElementById('download-cl-only-btn').style.display = COVERS[key] ? '' : 'none';
  document.getElementById('tracker-btn').style.display = '';
  document.getElementById('cv-btn').style.display = 'none';
}

// ════════════════════════════════════════════════════════════════════════════
// JD Fetch + Panel
// ════════════════════════════════════════════════════════════════════════════

function jdKey() {
  return 'jd_' + document.getElementById('version-select').value;
}
function saveJDData(url, text) {
  localStorage.setItem(jdKey(), JSON.stringify({ url, text }));
}
function loadJDData() {
  try { return JSON.parse(localStorage.getItem(jdKey())) || null; } catch { return null; }
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  d.querySelectorAll('script,style,nav,header,footer,aside').forEach(e => e.remove());
  return (d.innerText || d.textContent || '').replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
}

async function fetchAndShowJD() {
  const url = document.getElementById('jd-url-input').value.trim();
  const status = document.getElementById('jd-status');
  if (!url) { status.textContent = 'Enter a URL first.'; return; }
  status.textContent = 'Fetching…';
  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const res = await fetch(proxy, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const text = stripHtml(data.contents || '');
    if (!text || text.length < 80) throw new Error('empty');
    saveJDData(url, text);
    status.textContent = '✓ Loaded';
    renderJDPanel(url, text, false);
    showJD();
  } catch (e) {
    const saved = loadJDData();
    status.textContent = saved && saved.text
      ? '✓ Loaded from memory (fetch failed)'
      : 'Could not fetch — paste text manually in JD view.';
    renderJDPanel(url, saved ? saved.text : '', true);
    showJD();
  }
}

function renderJDPanel(url, text, showEdit) {
  const toolbarUrl = document.getElementById('jd-toolbar-url');
  const panel = document.getElementById('jd-text-panel');
  const paste = document.getElementById('jd-paste-area');
  toolbarUrl.innerHTML = url
    ? '<a href="' + url + '" target="_blank">' + url + ' ↗</a>'
    : '<span style="color:#555">No URL</span>';
  panel.textContent = text || '';
  panel.style.display = text ? '' : 'none';
  paste.value = text || '';
  paste.style.display = (showEdit || !text) ? '' : 'none';
  document.getElementById('jd-view-btn').style.display = '';
}

function toggleJDEdit() {
  const paste = document.getElementById('jd-paste-area');
  if (paste.style.display === 'none') {
    const saved = loadJDData();
    paste.value = saved ? saved.text : '';
    paste.style.display = '';
    paste.focus();
  } else {
    saveJDFromTextarea();
    paste.style.display = 'none';
  }
}

function saveJDFromTextarea() {
  const paste = document.getElementById('jd-paste-area');
  const url = document.getElementById('jd-url-input').value.trim();
  const text = paste.value.trim();
  if (!text) return;
  saveJDData(url, text);
  const panel = document.getElementById('jd-text-panel');
  panel.textContent = text;
  panel.style.display = '';
  document.getElementById('jd-status').textContent = '✓ Saved';
  document.getElementById('jd-view-btn').style.display = '';
}

function showJD() {
  document.getElementById('cv-pages-container').style.display = 'none';
  document.getElementById('cover-letter-section').classList.remove('visible');
  document.getElementById('tracker-section').style.display = 'none';
  document.getElementById('jd-section').style.display = '';
  document.getElementById('download-btn').style.display = 'none';
  document.getElementById('download-cv-only-btn').style.display = 'none';
  document.getElementById('download-cl-only-btn').style.display = 'none';
  document.getElementById('tracker-btn').style.display = 'none';
  document.getElementById('cv-btn').style.display = 'block';
}

function printCVOnly() {
  const cl = document.getElementById('cover-letter-section');
  const wasVisible = cl.classList.contains('visible');
  cl.classList.remove('visible');
  window.print();
  if (wasVisible) cl.classList.add('visible');
}

function printCLOnly() {
  const cl = document.getElementById('cover-letter-section');
  const wasVisible = cl.classList.contains('visible');
  cl.classList.add('visible');
  document.body.classList.add('print-cl-only');
  window.print();
  document.body.classList.remove('print-cl-only');
  if (!wasVisible) cl.classList.remove('visible');
}

// ════════════════════════════════════════════════════════════════════════════
// UI wiring
// ════════════════════════════════════════════════════════════════════════════

document.getElementById('version-select').addEventListener('change', e => {
  const key = e.target.value;
  const cv = CVS[key];
  if (cv) buildPages(cv);
  const cl = COVERS[key];
  const clSection  = document.getElementById('cover-letter-section');
  const clBody     = document.getElementById('cover-letter-body');
  const clOnlyBtn  = document.getElementById('download-cl-only-btn');
  if (cl) {
    clBody.innerHTML = cl.trim().split(/\n\n+/).map(p => '<p>' + esc(p.trim()) + '</p>').join('');
    clSection.classList.add('visible');
    clOnlyBtn.style.display = '';
  } else {
    clBody.innerHTML = '';
    clSection.classList.remove('visible');
    clOnlyBtn.style.display = 'none';
  }
  // Load saved JD for this version
  const saved = loadJDData();
  const urlInput = document.getElementById('jd-url-input');
  const viewBtn  = document.getElementById('jd-view-btn');
  const status   = document.getElementById('jd-status');
  if (saved && saved.url)  urlInput.value = saved.url;
  else urlInput.value = CV_APPLICATIONS.find(a => a.key === key)?.jdUrl || '';
  viewBtn.style.display = saved && saved.text ? '' : 'none';
  status.textContent = saved && saved.text ? '✓ JD saved' : '';
});

// Init
buildPages(CVS['default']);

// Pre-populate JD URL from saved data or jdUrl field
(function initJD() {
  const saved = loadJDData();
  const firstApp = CV_APPLICATIONS[0];
  document.getElementById('jd-url-input').value =
    (saved && saved.url) ? saved.url : (firstApp.jdUrl || '');
  if (saved && saved.text) {
    document.getElementById('jd-view-btn').style.display = '';
    document.getElementById('jd-status').textContent = '✓ JD saved';
  }
})();
</script>
